<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Extension Test Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Debug panel */
        #debugPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999;
            border-top: 2px solid #0f0;
        }

        #debugPanel .log-entry {
            margin: 2px 0;
        }

        #debugPanel .log-error {
            color: #f55;
        }

        #debugPanel .log-warn {
            color: #ff0;
        }

        #testControls {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 8px 12px;
            z-index: 9999;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 2px solid #667eea;
        }

        #testControls button {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            flex: none;
        }

        #testControls button:hover {
            background: #764ba2;
        }

        #testControls span {
            color: #aaa;
            font-size: 12px;
        }

        body {
            padding-top: 45px;
            padding-bottom: 210px;
        }
    </style>
</head>

<body>

    <!-- Test Controls -->
    <div id="testControls">
        <button onclick="mockAddDownload()">➕ Add Mock Download</button>
        <button onclick="mockProgressAll()">⏩ Simulate Progress</button>
        <button onclick="mockClearAll()">🗑️ Clear All</button>
        <span>Mock Chrome Extension Test Page</span>
    </div>

    <!-- Actual popup content (same as popup.html) -->
    <div id="viewManager" class="view-container active-view">
        <div id="diskInfo" class="disk-info">
            <div class="loading">Loading disk space...</div>
        </div>

        <div id="managerEmptyState" class="empty-state">
            <div class="empty-icon">📂</div>
            <div class="empty-text">No active downloads</div>
        </div>

        <div id="downloadsList" class="downloads-list">
        </div>

        <div id="backendStats" class="backend-stats">
            <div class="stats-header">⚙️ Backend Counters</div>
            <div class="stats-row">
                <span>Paused: <span id="statPause">0</span></span>
                <span>Resumed: <span id="statResume">0</span></span>
                <span>Canceled: <span id="statCancel">0</span></span>
            </div>
        </div>
    </div>
    <div id="errorMessage" class="error-message"></div>

    <template id="downloadItemTemplate">
        <div class="download-item">
            <div class="dl-info-row">
                <span class="dl-name"></span>
                <span class="dl-status"></span>
            </div>
            <div class="dl-progress-bar">
                <div class="dl-progress-fill"></div>
            </div>
            <div class="dl-stats-row">
                <span class="dl-size"></span>
                <span class="dl-speed"></span>
            </div>
            <div class="dl-controls">
                <button class="dl-btn dl-btn-pause" title="Pause">⏸️</button>
                <button class="dl-btn dl-btn-resume" title="Resume" style="display: none;">▶️</button>
                <button class="dl-btn dl-btn-cancel" title="Cancel">❌</button>
            </div>
        </div>
    </template>

    <!-- Debug Panel -->
    <div id="debugPanel">
        <div><b>=== Debug Console ===</b></div>
    </div>

    <script>
        // ============ MOCK CHROME APIs ============

        // Mock download database
        let mockDownloads = [];
        let nextId = 1;
        let progressIntervals = {};

        // Override console to show in debug panel
        const origLog = console.log;
        const origError = console.error;
        const origWarn = console.warn;

        function debugLog(msg, type = 'log') {
            const panel = document.getElementById('debugPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (type === 'error' ? ' log-error' : type === 'warn' ? ' log-warn' : '');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;
        }

        console.log = function () {
            const msg = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            debugLog(msg, 'log');
            origLog.apply(console, arguments);
        };
        console.error = function () {
            const msg = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            debugLog(msg, 'error');
            origError.apply(console, arguments);
        };
        console.warn = function () {
            const msg = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            debugLog(msg, 'warn');
            origWarn.apply(console, arguments);
        };

        // Mock chrome namespace
        window.chrome = {
            downloads: {
                search: function (query) {
                    return Promise.resolve(mockDownloads.filter(dl => {
                        if (query.state && dl.state !== query.state) return false;
                        if (query.id !== undefined && dl.id !== query.id) return false;
                        return true;
                    }));
                },
                pause: function (id) {
                    const dl = mockDownloads.find(d => d.id === id);
                    if (!dl) return Promise.reject(new Error("Download not found: " + id));
                    if (dl.state !== 'in_progress') return Promise.reject(new Error("Cannot pause, state: " + dl.state));
                    dl.paused = true;
                    console.log("✅ chrome.downloads.pause(" + id + ") — SUCCESS");
                    return Promise.resolve();
                },
                resume: function (id) {
                    const dl = mockDownloads.find(d => d.id === id);
                    if (!dl) return Promise.reject(new Error("Download not found: " + id));
                    dl.paused = false;
                    dl.state = 'in_progress';
                    console.log("✅ chrome.downloads.resume(" + id + ") — SUCCESS");
                    return Promise.resolve();
                },
                cancel: function (id) {
                    const dl = mockDownloads.find(d => d.id === id);
                    if (!dl) return Promise.reject(new Error("Download not found: " + id));
                    dl.state = 'cancelled';
                    dl.paused = false;
                    // Remove from active downloads
                    mockDownloads = mockDownloads.filter(d => d.id !== id);
                    if (progressIntervals[id]) {
                        clearInterval(progressIntervals[id]);
                        delete progressIntervals[id];
                    }
                    console.log("✅ chrome.downloads.cancel(" + id + ") — SUCCESS — download removed");
                    return Promise.resolve();
                }
            },
            action: {
                setBadgeText: function () { return Promise.resolve(); },
                setBadgeBackgroundColor: function () { return Promise.resolve(); }
            },
            runtime: {
                sendNativeMessage: function (host, msg) {
                    console.warn("⚠️ sendNativeMessage called (mocked, will fail): " + JSON.stringify(msg));
                    return Promise.reject(new Error("Native messaging not available in test mode"));
                }
            }
        };

        // ============ TEST CONTROLS ============

        const filenames = [
            'ubuntu-24.04-desktop-amd64.iso',
            'node-v20.11.0-x64.msi',
            'video-tutorial.mp4',
            'project-backup.zip',
            'wallpaper-4k.png',
            'music-album.mp3',
            'report-Q4-2024.pdf'
        ];

        function mockAddDownload() {
            const id = nextId++;
            const totalBytes = Math.floor(Math.random() * 500 * 1024 * 1024) + 10 * 1024 * 1024; // 10MB-500MB
            const filename = filenames[Math.floor(Math.random() * filenames.length)];

            const dl = {
                id: id,
                filename: 'C:\\Users\\Downloads\\' + filename,
                url: 'https://example.com/' + filename,
                state: 'in_progress',
                paused: true,  // Simulates what background.js does (auto-pause)
                bytesReceived: 0,
                totalBytes: totalBytes,
                canResume: true,
                estimatedEndTime: new Date(Date.now() + 60000).toISOString()
            };

            mockDownloads.push(dl);
            console.log("➕ Added mock download: " + filename + " (ID: " + id + ", Size: " + (totalBytes / 1024 / 1024).toFixed(1) + " MB) — PAUSED (simulating background.js auto-pause)");
        }

        function mockProgressAll() {
            mockDownloads.forEach(dl => {
                if (dl.state === 'in_progress' && !dl.paused) {
                    // Already progressing
                    return;
                }
                if (dl.state === 'in_progress' && !dl.paused && !progressIntervals[dl.id]) {
                    startProgress(dl);
                }
            });

            // Also start progress for any non-paused downloads
            mockDownloads.forEach(dl => {
                if (dl.state === 'in_progress' && !dl.paused && !progressIntervals[dl.id]) {
                    startProgress(dl);
                }
            });
            console.log("⏩ Progress simulation active for non-paused downloads");
        }

        function startProgress(dl) {
            if (progressIntervals[dl.id]) return;
            progressIntervals[dl.id] = setInterval(() => {
                if (dl.paused || dl.state !== 'in_progress') {
                    clearInterval(progressIntervals[dl.id]);
                    delete progressIntervals[dl.id];
                    return;
                }
                const increment = Math.floor(Math.random() * 2 * 1024 * 1024) + 500000; // 0.5-2.5 MB per tick
                dl.bytesReceived = Math.min(dl.bytesReceived + increment, dl.totalBytes);
                dl.estimatedEndTime = new Date(Date.now() + ((dl.totalBytes - dl.bytesReceived) / increment) * 500).toISOString();

                if (dl.bytesReceived >= dl.totalBytes) {
                    dl.state = 'complete';
                    clearInterval(progressIntervals[dl.id]);
                    delete progressIntervals[dl.id];
                    mockDownloads = mockDownloads.filter(d => d.id !== dl.id);
                    console.log("🎉 Download complete: " + dl.filename.split('\\').pop());
                }
            }, 500);
        }

        // Watch for resume to start progress
        const origResume = chrome.downloads.resume;
        chrome.downloads.resume = function (id) {
            return origResume(id).then(() => {
                const dl = mockDownloads.find(d => d.id === id);
                if (dl && !dl.paused) {
                    startProgress(dl);
                }
            });
        };

        function mockClearAll() {
            Object.keys(progressIntervals).forEach(id => clearInterval(progressIntervals[id]));
            progressIntervals = {};
            mockDownloads = [];
            nextId = 1;
            console.log("🗑️ All mock downloads cleared");
        }
    </script>

    <!-- Load the actual popup.js AFTER mocks are set up -->
    <script src="popup.js"></script>
</body>

</html>
